services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline
      POSTGRES_DB: pipeline
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://pipeline:pipeline@db:5432/pipeline?sslmode=disable
      PORT: "8080"
      BASE_URL: http://localhost:8080
      CLEANUP_INTERVAL: 1h
      CLEANUP_MAX_AGE: 24h
    env_file:
      - path: ./.env
        required: false
    depends_on:
      db:
        condition: service_healthy
